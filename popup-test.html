<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试popup</title>
    <style>
        body {
            width: 320px;
            min-height: 400px;
            margin: 0;
            padding: 16px;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }
        .btn {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .btn:hover {
            background: #0056b3;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: white;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h3>🧪 扩展测试工具</h3>

    <button class="btn" onclick="testPing()">测试Ping</button>
    <button class="btn" onclick="testAnalysis()">测试分析</button>
    <button class="btn" onclick="testCurrentPage()">分析当前页面</button>

    <div id="result" class="result">等待测试...</div>

    <script>
        function log(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = message;
            console.log(message);
        }

        function testPing() {
            log('发送ping请求...');

            chrome.runtime.sendMessage({
                action: 'ping'
            }, function(response) {
                if (chrome.runtime.lastError) {
                    log('❌ 错误: ' + chrome.runtime.lastError.message);
                } else {
                    log('✅ Ping响应: ' + JSON.stringify(response, null, 2));
                }
            });
        }

        function testAnalysis() {
            log('发送测试分析请求...');

            chrome.runtime.sendMessage({
                action: 'analyzeDrama',
                data: {
                    platform: 'bilibili',
                    title: '测试短剧标题',
                    url: 'https://www.bilibili.com/test'
                }
            }, function(response) {
                if (chrome.runtime.lastError) {
                    log('❌ 错误: ' + chrome.runtime.lastError.message);
                } else {
                    log('✅ 分析响应: ' + JSON.stringify(response, null, 2));
                }
            });
        }

        function testCurrentPage() {
            log('获取当前页面信息...');

            chrome.tabs.query({ active: true, currentWindow: true }, function(tabs) {
                const currentTab = tabs[0];

                chrome.runtime.sendMessage({
                    action: 'analyzeDrama',
                    data: {
                        platform: 'bilibili',
                        title: currentTab.title,
                        url: currentTab.url
                    }
                }, function(response) {
                    if (chrome.runtime.lastError) {
                        log('❌ 错误: ' + chrome.runtime.lastError.message);
                    } else {
                        log('✅ 页面分析响应: ' + JSON.stringify(response, null, 2));
                    }
                });
            });
        }
    </script>
</body>
</html>
