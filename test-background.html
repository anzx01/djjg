<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台脚本测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .test-button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
            font-family: monospace;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>后台脚本测试</h1>

    <div class="test-section">
        <h3>1. 测试后台脚本响应</h3>
        <button class="test-button" onclick="testBackgroundResponse()">测试响应</button>
        <div id="response-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>2. 测试分析功能</h3>
        <button class="test-button" onclick="testAnalysis()">测试分析</button>
        <div id="analysis-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>3. 测试当前页面分析</h3>
        <button class="test-button" onclick="testCurrentPageAnalysis()">分析当前页面</button>
        <div id="current-page-result" class="result"></div>
    </div>

    <script>
        // 测试后台脚本响应
        function testBackgroundResponse() {
            const resultDiv = document.getElementById('response-result');
            resultDiv.textContent = '测试中...';

            chrome.runtime.sendMessage({
                action: 'ping',
                timestamp: Date.now()
            }, function(response) {
                if (chrome.runtime.lastError) {
                    resultDiv.textContent = '❌ 错误: ' + chrome.runtime.lastError.message;
                } else if (response) {
                    resultDiv.textContent = '✅ 后台脚本响应正常:\n' + JSON.stringify(response, null, 2);
                } else {
                    resultDiv.textContent = '⚠️ 后台脚本未响应';
                }
            });
        }

        // 测试分析功能
        function testAnalysis() {
            const resultDiv = document.getElementById('analysis-result');
            resultDiv.textContent = '分析中...';

            const testData = {
                platform: 'bilibili',
                url: 'https://www.bilibili.com/video/test123',
                title: '测试短剧',
                timestamp: Date.now(),
                videoInfo: {
                    title: '测试短剧标题',
                    description: '这是一个测试短剧的描述'
                },
                textContent: {
                    subtitles: [
                        { text: '这是字幕内容1', timestamp: Date.now() },
                        { text: '这是字幕内容2', timestamp: Date.now() }
                    ],
                    description: '短剧描述'
                },
                metadata: {
                    author: '测试作者',
                    platform: 'B站'
                },
                engagement: {
                    viewCount: '10000',
                    likeCount: '500'
                },
                episodeInfo: {
                    episodeNumber: '1',
                    episodeTitle: '第一集'
                }
            };

            chrome.runtime.sendMessage({
                action: 'analyzeDrama',
                data: testData
            }, function(response) {
                if (chrome.runtime.lastError) {
                    resultDiv.textContent = '❌ 分析错误: ' + chrome.runtime.lastError.message;
                } else if (response && response.success) {
                    resultDiv.textContent = '✅ 分析成功:\n' + JSON.stringify(response.data, null, 2);
                } else {
                    resultDiv.textContent = '❌ 分析失败: ' + (response?.error || '未知错误');
                }
            });
        }

        // 测试当前页面分析
        function testCurrentPageAnalysis() {
            const resultDiv = document.getElementById('current-page-result');
            resultDiv.textContent = '获取当前页面信息...';

            chrome.tabs.query({ active: true, currentWindow: true }, function(tabs) {
                const currentTab = tabs[0];

                const testData = {
                    url: currentTab.url,
                    title: currentTab.title,
                    platform: getPlatformFromUrl(currentTab.url),
                    timestamp: Date.now(),
                    videoInfo: {
                        title: currentTab.title,
                        description: ''
                    }
                };

                resultDiv.textContent = '发送分析请求...';

                chrome.runtime.sendMessage({
                    action: 'analyzeDrama',
                    data: testData
                }, function(response) {
                    if (chrome.runtime.lastError) {
                        resultDiv.textContent = '❌ 分析错误: ' + chrome.runtime.lastError.message;
                    } else if (response && response.success) {
                        resultDiv.textContent = '✅ 分析成功:\n' + JSON.stringify(response.data, null, 2);
                    } else {
                        resultDiv.textContent = '❌ 分析失败: ' + (response?.error || '未知错误');
                    }
                });
            });
        }

        // 从URL提取平台信息
        function getPlatformFromUrl(url) {
            const platformConfigs = {
                'douyin.com': 'douyin',
                'v.douyin.com': 'douyin',
                'iesdouyin.com': 'douyin',
                'kuaishou.com': 'kuaishou',
                'bilibili.com': 'bilibili',
                'b23.tv': 'bilibili',
                'ixigua.com': 'ixigua',
                'toutiao.com': 'ixigua'
            };

            for (const [domain, platform] of Object.entries(platformConfigs)) {
                if (url.includes(domain)) {
                    return platform;
                }
            }
            return null;
        }
    </script>
</body>
</html>
